services:
  tooly-auth-db:
    image: postgres:16
    container_name: promo_code-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: promo_code
    ports:
      - "5435:5432"
    volumes:
      - promo_code_pg:/var/lib/postgresql/data

volumes:
  promo_code_pg:

